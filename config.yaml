# Runtime configuration for picture-analyzer
# This file targets local Ollama with per-step model overrides.

analyzer_provider: "ollama"

ollama:
  model: "llama3.2-vision:11b"           # fallback when no per-step model is set
  host: "http://127.0.0.1:11434"
  #host: "http://192.168.2.66:11434"
  max_tokens: 16384
  timeout: 1200                           # seconds per step; CPU inference + cold reload can take 15+ min
  num_ctx: 16384                          # KV-cache context window; mllama images use ~8000 tokens alone

pipeline:
  mode: stepped
  metadata:
    model: "llama3.2-vision:11b"   # needs strong visual + language understanding
  location:
    model: "llama3.2-vision:11b"   # same — geographic reasoning from visual clues
  enhancement:
    model: "llama3.2-vision:11b"   # simpler structured task, smaller model is fine
    max_tokens: 1024               # enhancement JSON is small; cap to prevent runaway loops
  slide_profiles:
    model: "llama3.2-vision:11b"   # same
    max_tokens: 512                # slide profile JSON is tiny

openai:
  # Kept for compatibility when switching providers.
  model: "gpt-4o-mini"
  max_tokens: 4096
  detail: "auto"

metadata:
  language: "nl"

geo:
  provider: "nominatim"
  confidence_threshold: 80

output:
  directory: "output"

batch_size: 5
log_level: "INFO"
